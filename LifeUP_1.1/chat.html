<!DOCTYPE html>
<html lang="pt-br">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente Virtual</title>

    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >
    <link 
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" 
        rel="stylesheet"
    >
    <link 
        rel="stylesheet" 
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >
    <link 
        rel="stylesheet" 
        href="css/chat.css"
    >
    </head>
    <body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="d-flex align-items-center gap-2">
                <a href="home.html" class="btn-voltar" aria-label="Voltar para a home">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <img src="images/img-person.png" alt="Atendente">
                <div>
                    <h5 class="m-0">Mariana Bolsenn</h5>
                    <p id="status">Online</p>
                </div>
            </div>
        </div>
        <div id="history">
            
        </div>
        <div class="chat-footer">
            <input type="text" id="message-input" placeholder="Digite sua mensagem aqui...">
            <button id="btn-submit" onclick="sendMessage()">
                <i class="bi bi-send-fill"></i>
            </button>
        </div>
    </div>

    <script src="scripts/chatScript.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    </body>
</html>
