    <div class="container-main">
        <div class="container-content">
            
            <h1 class="saudacao-titulo">Diário Emocional</h1>
            <p class="saudacao-subtitulo">Por favor escolha como você tem se sentido hoje:</p>
    
            <div class="banner-motivacional">
                <div class="btn-toolbar" role="toolbar" aria-label="Toolbar with button groups">
                    <div class="btn-group me-2" role="group" aria-label="First group">
                        <div style="flex-direction: column; display: flex; padding: 0.2rem; align-items: center;">
                            <button onclick="selecionarEmocao(this,'bi-emoji-angry-fill')" type="button" class="btn btn-emocoes"><img src="images/Cara-brava.png" alt="emoji deprimido" value="bravo" id="bravo"></button>
                            <p>Estressado</p>
                        </div>
                        <div style="flex-direction: column; display: flex; padding: 0.2rem; align-items: center;">
                            <button onclick="selecionarEmocao(this,'bi-emoji-frown-fill')" type="button" class="btn btn-emocoes"><img src="images/Cara-triste.png" alt="emoji triste" value="triste" id="triste"></button>

                            <p>Feliz</p>
                        </div>
                    </div>
                </div>
