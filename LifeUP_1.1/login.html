<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login - Mobile First</title>
        
        <link rel="stylesheet" href="css/login.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    </head>
    <body>
        <div class="container-main">
            <div class="container-content">
                <a href="/index.html" class="btn-voltar" aria-label="Voltar para a pagina inicial">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <img src="images/img-purpleEmotion.png" alt="Personagem Roxo" class="top-illustration">
                <h1 class="welcome-text">Que bom te ver por aqui!</h1>

                <form action="home.html" class="w-100">
                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail *</label>
                        <input type="email" class="form-control" id="email" placeholder="Insira seu e-mail" required>
                    </div>
                    <div class="mb-4">
                        <label for="senha" class="form-label">Senha *</label>
                        <input type="password" class="form-control" id="senha" placeholder="Insira sua senha" required>
                    </div>
                    <button type="submit" class="btn btn-login">Entrar</button>
                </form>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
