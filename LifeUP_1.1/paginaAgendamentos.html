<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamentos</title>

    <link rel="stylesheet" href="css/paginaAgendamentos.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>

    <div class="container">

        <header class="topo">
            <i class="bi bi-arrow-left voltar"></i>
            <h1>Agendamentos</h1>
        </header>

        <section class="abas">
            <button class="ativo">Proximos</button>
            <button>Histórico</button>
        </section>

        <section class="card">
            <div class="icone-calendario">
                <i class="bi bi-calendar3"></i>
            </div>

            <div class="info">
                <h2>Maria Bolsenn</h2>
                <p>20 de julho * 10:00</p>
                <p>Consulta online</p>
                <span class="status">Confirmado</span>
            </div>
        </section>

        <section class="card">
            <div class="icone-calendario">
                <i class="bi bi-calendar3"></i>
            </div>

            <div class="info">
                <h2>Roberto Silva</h2>
                <p>24 de Agosto * 11:00</p>
                <p>Consulta online</p>
                <span class="status">Confirmado</span>
            </div>
        </section>

        <button class="novo">
            <i class="bi bi-plus"></i>
            Novo agendamento
        </button>

        <nav class="menu">
            <div class="item ativo-menu">
                <i class="bi bi-house-fill"></i>
                <p>Home</p>
            </div>

            <div class="item">
                <i class="bi bi-chat"></i>
                <p>Chat</p>
            </div>

            <div class="item">
                <i class="bi bi-check2-square"></i>
                <p>Diário</p>
            </div>

            <div class="botao-centro">
                <i class="bi bi-plus"></i>
            </div>

            <div class="item">
                <i class="bi bi-heart"></i>
                <p>Apoio</p>
            </div>

            <div class="item">
                <i class="bi bi-person"></i>
                <p>Perfil</p>
            </div>
        </nav>

    </div>

</body>
</html>
