<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversas</title>

    <link rel="stylesheet" href="css/paginaConversa.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>

    <div class="container">

        <h1 class="titulo">Conversas</h1>

        <div class="topo-busca">

            <div class="busca">
                <i class="bi bi-search"></i>
                <input type="text" placeholder="Buscar conversa">
            </div>

            <div class="qr">
                <i class="bi bi-qr-code"></i>
            </div>

        </div>

        <div class="lista">

            <div class="conversa">
                <img src="images/jose.png" alt="José">

                <div class="texto">
                    <h2>José Pereira</h2>
                    <p>Última mensagem: Obrigado....</p>
                </div>

                <span class="hora">14:30</span>
            </div>

            <div class="conversa">
                <img src="images/roberto.png" alt="Roberto">

                <div class="texto">
                    <h2>Roberto Silva</h2>
                    <p>Última mensagem: Perfeito!</p>
                </div>

                <span class="hora">Ontem</span>
            </div>

            <div class="conversa">
                <img src="images/ana.png" alt="Ana">

                <div class="texto">
                    <h2>Ana Beatriz</h2>
                    <p>Última mensagem: Até mais!</p>
                </div>

                <span class="hora">Ontem</span>
            </div>

            <div class="conversa">

                <div class="grupo">
                    <i class="bi bi-person-circle"></i>
                </div>

                <div class="texto">
                    <h2>Grupo: Ansiedade</h2>
                    <p>João: Alguem tem dicas?</p>
                </div>

                <span class="hora">Ontem</span>

            </div>

        </div>

        <div class="novo-chat">
            <i class="bi bi-plus"></i>
        </div>

        <nav class="menu">

            <div class="item ativo-menu">
                <i class="bi bi-house-fill"></i>
                <p>Home</p>
            </div>

            <div class="item">
                <i class="bi bi-chat"></i>
                <p>Chat</p>
            </div>

            <div class="item">
                <i class="bi bi-check2-square"></i>
                <p>Diário</p>
            </div>

            <div class="botao-centro">
                <i class="bi bi-plus"></i>
            </div>

            <div class="item">
                <i class="bi bi-heart"></i>
                <p>Apoio</p>
            </div>

            <div class="item">
                <i class="bi bi-person"></i>
                <p>Perfil</p>
            </div>

        </nav>

    </div>

</body>
</html>
