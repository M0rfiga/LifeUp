<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Usuario</title>
    
    <link rel="stylesheet" href="css/perfilUserEditar.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

    <div class="container-main">
        <div class="container-content-cabecalho"> 
            <div class="cabecalho-usuario">
                <img src="/LifeUP_1.1/images/img-user.png" alt="Foto de Perfil">
                <h1 class="saudacao-titulo">Usuário</h1>
            </div>
        </div>  

        <div class="container-content">
            <form action="perfilUser.html">
            <div class="card-article">
                <div class="w-100">
                    <h2 class="article-titulo">Nome</h2>
                    <div class="mb-1">
                        <label for="nome" class="form-label"></label>
                        <input type="text" class="form-control" placeholder="Usuário">
                    </div>
                </div>
            </div>
            <div class="card-article">
                <div class="w-100">
                    <h2 class="article-titulo">E-MAIL</h2>
                    <div class="mb-2">
                        <label for="email" class="form-label"></label>
                        <input type="email" class="form-control" id="email" placeholder="Insira seu e-mail" required>
                    </div>
                </div>
            </div>
            <div class="card-article">
                <div class="w-100">
                    <h2 class="article-titulo">LOCALIZAÇÃO</h2>
                    <p class="article-previa">Brasil - Minas Gerais</p>
                </div>
            </div>
            <div class="card-article">
                <div class="w-100">
                    <h2 class="article-titulo">NÚMERO DE TELEFONE</h2>
                    <div class="mb-3">
                        <label for="telefone" class="form-label"></label>
                        <input type="tel" class="form-control" placeholder="+55 (34)9 9999-9999">
                    </div>
                </div>
            </div>
            <button type="submit" class="btn btn-editar">Editar</button>
            </form>
            <nav class="bottom-nav">
                <a href="home.html" class="nav-item-custom">
                    <i class="bi bi-house-door-fill"></i>
                    <span>Home</span>
                </a>
                <a href="chat.html" class="nav-item-custom">
                    <i class="bi bi-chat-text"></i>
                    <span>Chat</span>
                </a>
                <a href="diario.html" class="nav-item-custom nav-btn-plus">
                    <i class="bi bi-plus-lg"></i>
                </a>
                
                <a href="contatos.html" class="nav-item-custom">
                    <i class="bi bi-people"></i>
                    <span>Apoio</span>
                </a>
                <a href="perfilUser.html" class="nav-item-custom active">
                    <i class="bi bi-person-circle"></i>
                    <span>Perfil</span>
                </a>
            </nav>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
