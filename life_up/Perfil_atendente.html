<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Perfil</title>

    <link rel="stylesheet" href="Perfil_atendente.css">

    <!-- Ícones -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="container">

        <!-- TOPO -->
        <div class="topo">

            <!-- CABEÇALHO -->
            <div class="header">

                <i class="fa-solid fa-arrow-left"></i>

                <h2>Perfil</h2>

            </div>

            <!-- FOTO PERFIL -->
            <div class="foto-area">

                <div class="foto-perfil">
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="camera">
                    <i class="fa-solid fa-camera"></i>
                </div>

            </div>

            <!-- NOME -->
            <div class="usuario">

                <h3>Usuário</h3>

                <i class="fa-solid fa-pen"></i>

            </div>

        </div>

        <!-- INFORMAÇÕES -->
        <div class="info">

            <div class="campo">
                <h4>NOME</h4>
                <p>Usuário</p>
            </div>

            <div class="campo">
                <h4>E-MAIL</h4>
                <p>usuario@gmail.com</p>
            </div>

            <div class="campo">
                <h4>LOCALIZAÇÃO</h4>
                <p>Brasil - Minas Gerais</p>
            </div>

            <div class="campo">
                <h4>NÚMERO COMERCIAL</h4>
                <p>+55 34 9 9999-9999</p>
            </div>

            <div class="campo">
                <h4>LINKS</h4>
                <p>https://certificadoDigital</p>
            </div>

        </div>

    </div>

</body>
</html>
