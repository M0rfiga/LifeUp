<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Auto ajuda</title>
        
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
        <!-- Link necessário para integrar o Bootstrap "colocá-lo antes de qualquer outro link:css" -->
        <link rel="stylesheet" href="css/pattern_designs.css">
        <!-- Link necessário para aplicar padrões de elementos -->
        <link rel="stylesheet" href="css/auto-ajuda.css">
        <link rel="icon" href="icons/fav-ic-LifeUp.ico" type="image/x-icon">
    </head>
    <body>
        <header> 
            <!-- Cabeçalho da página -->
            <div class="container-menu">
                <nav>
                    <a href="#"><img src="icons/ic-arrow-small-left-black.png" alt="Voltar"></a>
                </nav>

                <h1></h1>
                <p>Converse com estudantes ou profissional para obter apoio e acolhimento</p>
            </div>
        </header>
        <main>
            <!-- Container de pesquisa -->
            <div class="container-search">
                <div class="container-search-person">
                    <img src="icons/ic-search-black.png" alt="Pesquisar">
                    <input type="text" placeholder="Busque pelo nome">
                </div>
                <div class="container-search-person-buttons">
                    <button class="btn-search btn-search-color1">
                        <img src="icons/ic-megaphone-white.png" alt="SOS">
                        <p>SOS</p>
                    </button>
                    <button class="btn-search btn-search-color2">
                        <img src="icons/ic-bell-white.png" alt="Disponiveis">
                        <p>Disponíveis</p>
                    </button>
                </div>
            </div>
            <div class="container-person-cards">
                <!-- Container de contatos disponíveis -->
                <h1>Contatos de apoio disponíveis</h1>

                <div class="card-person">
                    <div class="card-img">
                        <img src="images/person1.png" alt="Atendente">
                    </div>
                    <div class="card-info">
                        <h1>Roberto Silva</h1>
                        <p>Disponível</p>
                        
                        <button class="btn-person btn-color1">Conversar</button>
                    </div>
                </div>
                <div class="card-person">
                    <div class="card-img">
                        <img src="images/person2.jpg" alt="Atendente">
                    </div>
                    <div class="card-info">
                        <h1>Marina Barbieri</h1>
                        <p>Disponível</p>
                        
                        <button class="btn-person btn-color2">Conversar</button>
                    </div>
                </div>
                <div class="card-person">
                    <div class="card-img">
                        <img src="images/person3.jpg" alt="Atendente">
                    </div>
                    <div class="card-info">
                        <h1>Carlos Antony</h1>
                        <p>Disponível</p>
                        
                        <button class="btn-person btn-color3">Conversar</button>
                    </div>
                </div>
            </div>
        </main>
        <footer>
            <img src="icons/ic-badge-check-water-green.png" alt="Acessível">
            <p>Atendimento Acessível e Humanizado</p>
        </footer>
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Script necessário para integrar funcionalidades do bootstrap -->
    </body>
</html>
