<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diário de Emoções</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/pattern_designs.css">
    <link rel="stylesheet" href="css/controle_de_emocoes.css">
    <link rel="icon" href="icons/fav-ic-LifeUp.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <header>
        <!-- Cabeçalho da página -->
        <div class="container-menu">
            <nav>
                <a href="#"><img src="icons/ic-arrow-small-left-black.png" alt="Voltar"></a>
            </nav>
            <h1>Diário de Emoções</h1>
        </div>
    </header>
    <main>

        <div class="card text-bg-info" style="width: 20rem;">
            <img src="images/AmoebinhasSquare.png" class="card-img" alt="amoebinhas coloridas">

            <div class="card-img-overlay">
                <h5 class="card-title-dark">Olá, usuário!</h5>
                <h5 class="card-title-dark">Como está se sentindo hoje?</h5>

                <div class="btn-group d-flex btn-group-sm" role="group" aria-label="Basic radio toggle button group">

                    <button type="button" class="btn btn-color1">
                        <input type="radio" class="btn-check" name="btnradio" id="btnradio1" autocomplete="off" checked>
                        <label class="btn btn-outline-dark" for="btnradio1">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="yellow"
                                class="bi bi-emoji-frown-fill" viewBox="0 0 16 16">
                                <path
                                    d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16M7 6.5C7 7.328 6.552 8 6 8s-1-.672-1-1.5S5.448 5 6 5s1 .672 1 1.5m-2.715 5.933a.5.5 0 0 1-.183-.683A4.5 4.5 0 0 1 8 9.5a4.5 4.5 0 0 1 3.898 2.25.5.5 0 0 1-.866.5A3.5 3.5 0 0 0 8 10.5a3.5 3.5 0 0 0-3.032 1.75.5.5 0 0 1-.683.183M10 8c-.552 0-1-.672-1-1.5S9.448 5 10 5s1 .672 1 1.5S10.552 8 10 8" />
                            </svg>
                            Deprimido
                        </label>
                    </button>

                    <button type="button" class="btn btn-color1">
                        <input type="radio" class="btn-check" name="btnradio" id="btnradio2" autocomplete="off" checked>
                        <label class="btn btn-outline-dark" for="btnradio2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="yellow"
                                class="bi bi-emoji-frown-fill" viewBox="0 0 16 16">
                                <path
                                    d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16M7 6.5C7 7.328 6.552 8 6 8s-1-.672-1-1.5S5.448 5 6 5s1 .672 1 1.5m-2.715 5.933a.5.5 0 0 1-.183-.683A4.5 4.5 0 0 1 8 9.5a4.5 4.5 0 0 1 3.898 2.25.5.5 0 0 1-.866.5A3.5 3.5 0 0 0 8 10.5a3.5 3.5 0 0 0-3.032 1.75.5.5 0 0 1-.683.183M10 8c-.552 0-1-.672-1-1.5S9.448 5 10 5s1 .672 1 1.5S10.552 8 10 8" />
                            </svg>
                            Triste
                        </label>
                    </button>

                    <button type="button" class="btn btn-color1">
                        <input type="radio" class="btn-check" name="btnradio" id="btnradio3" autocomplete="off" checked>
                        <label class="btn btn-outline-dark" for="btnradio3">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="yellow"
                                class="bi bi-emoji-neutral-fill" viewBox="0 0 16 16">
                                <path
                                    d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16M7 6.5C7 7.328 6.552 8 6 8s-1-.672-1-1.5S5.448 5 6 5s1 .672 1 1.5m-3 4a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1-.5-.5M10 8c-.552 0-1-.672-1-1.5S9.448 5 10 5s1 .672 1 1.5S10.552 8 10 8" />
                            </svg>
                            Neutro
                        </label>
                    </button>

                    <button type="button" class="btn btn-color1">
                        <input type="radio" class="btn-check" name="btnradio" id="btnradio4" autocomplete="off" checked>
                        <label class="btn btn-outline-dark" for="btnradio4">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="yellow"
                                class="bi bi-emoji-smile-fill" viewBox="0 0 16 16">
                                <path
                                    d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16M7 6.5C7 7.328 6.552 8 6 8s-1-.672-1-1.5S5.448 5 6 5s1 .672 1 1.5M4.285 9.567a.5.5 0 0 1 .683.183A3.5 3.5 0 0 0 8 11.5a3.5 3.5 0 0 0 3.032-1.75.5.5 0 1 1 .866.5A4.5 4.5 0 0 1 8 12.5a4.5 4.5 0 0 1-3.898-2.25.5.5 0 0 1 .183-.683M10 8c-.552 0-1-.672-1-1.5S9.448 5 10 5s1 .672 1 1.5S10.552 8 10 8" />
                            </svg>
                            Feliz
                        </label>
                    </button>

                    <button type="button" class="btn btn-color1">
                        <input type="radio" class="btn-check" name="btnradio" id="btnradio5" autocomplete="off" checked>
                        <label class="btn btn-outline-dark" for="btnradio5">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="yellow"
                                class="bi bi-emoji-laughing-fill" viewBox="0 0 16 16">
                                <path
                                    d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16M7 6.5c0 .501-.164.396-.415.235C6.42 6.629 6.218 6.5 6 6.5s-.42.13-.585.235C5.164 6.896 5 7 5 6.5 5 5.672 5.448 5 6 5s1 .672 1 1.5m5.331 3a1 1 0 0 1 0 1A5 5 0 0 1 8 13a5 5 0 0 1-4.33-2.5A1 1 0 0 1 4.535 9h6.93a1 1 0 0 1 .866.5m-1.746-2.765C10.42 6.629 10.218 6.5 10 6.5s-.42.13-.585.235C9.164 6.896 9 7 9 6.5c0-.828.448-1.5 1-1.5s1 .672 1 1.5c0 .501-.164.396-.415.235" />
                            </svg>
                            Animado
                        </label>
                    </button>
                </div>

                <container>
                    <div class="mb-3">
                        <label for="exampleFormControlTextarea1" class="form-label"></label>
                        <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"
                            placeholder="Adicione uma nota ou conte sobre o seu dia!"></textarea>
                    </div>
                </container>
            </div>
        </div>

        <div class="container-person-cards">
            <h1>Histórico Emocional</h1>
        </div>

        <div>
            <table class="table table-bordered text-center">
                <thead>
                    <tr>
                        <th scope="col">Seg</th>
                        <th scope="col">Ter</th>
                        <th scope="col">Qua</th>
                        <th scope="col">Qui</th>
                        <th scope="col">Sex</th>
                        <th scope="col">Sab</th>
                        <th scope="col">Dom</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>-</td>
                        <td>-</td>
                        <td>-</td>
                        <td>-</td>
                        <td>1</td>
                        <td>2</td>
                        <td>3</td>
                    </tr>
                    <tr>
                        <td>4</td>
                        <td>5</td>
                        <td>6</td>
                        <td>7</td>
                        <td>8</td>
                        <td>9</td>
                        <td>10</td>
                    </tr>
                    <tr>
                        <td>11</td>
                        <td>12</td>
                        <td>13</td>
                        <td>14</td>
                        <td>15</td>
                        <td>16</td>
                        <td>17</td>
                    </tr>
                    <tr>
                        <td>18</td>
                        <td>19</td>
                        <td>20</td>
                        <td>21</td>
                        <td>22</td>
                        <td>23</td>
                        <td>24</td>
                    </tr>
                    <tr>
                        <td>25</td>
                        <td>26</td>
                        <td>27</td>
                        <td>28</td>
                        <td>29</td>
                        <td>30</td>
                        <td>31</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Script necessário para integrar funcionalidades do bootstrap -->
</body>

</html>
