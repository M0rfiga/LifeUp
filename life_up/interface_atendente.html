<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Life Up</title>

    <link rel="stylesheet" href="css/interface_atendente.css">

    <!-- Ícones -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="container">

        <!-- TOPO -->
        <header class="topo">

            <div class="perfil">

                <!-- FOTO PERFIL -->
                <div class="perfil-vazio"></div>

                <p>
                    Boa noite,<br>
                    <strong>Atendente</strong>
                </p>

            </div>

            <i class="fa-solid fa-gear"></i>

        </header>

        <!-- LOGO -->
        <section class="logo-area">

            <div class="logo-vazia">

                <img src="logo.png" alt="Logo Life Up">

            </div>

            <h1>Life Up</h1>

        </section>

        <!-- FRASE -->
        <div class="frase">

            <i class="fa-solid fa-quote-left"></i>

            <p>Você faz a diferença!</p>

        </div>

        <!-- BOTÃO -->
        <button class="btn-atendimento">

            <i class="fa-brands fa-whatsapp"></i>

            ATENDIMENTOS

        </button>

    </div>

</body>
</html>
