<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Up</title>

    <link rel="stylesheet" href="css/interface_cliente.css">

    <!-- Ícones -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="container">

        <!-- TOPO -->
        <header class="topo">

            <div class="usuario">
                <div class="foto-usuario">
                    <i class="fa-solid fa-user"></i>
                </div>

                <h2>Boa noite, <span>Usuário</span></h2>
            </div>

            <button class="config">
                <i class="fa-solid fa-gear"></i>
            </button>

        </header>

        <!-- LOGO / IMAGEM -->
        <section class="logo-area">

            <!-- ADICIONE SUA IMAGEM AQUI -->
            <div class="imagem-logo">
                <img src="logo_cliente.png" alt="Logo">
            </div>

            <h1>Life Up</h1>

        </section>

        <!-- FRASE -->
        <div class="frase">
            <i class="fa-solid fa-quote-left"></i>
            <p>Você é mais forte do que imagina.</p>
        </div>

        <!-- BOTÕES -->
        <section class="cards">

            <button class="card azul">
                <i class="fa-regular fa-comment"></i>
                <span>CHAT</span>
            </button>

            <button class="card rosa">
                <i class="fa-regular fa-user"></i>
                <span>CONTATOS DE APOIO</span>
            </button>

            <button class="card amarelo">
                <i class="fa-regular fa-calendar"></i>
                <span>EMOÇÕES</span>
            </button>

            <button class="card verde">
                <i class="fa-regular fa-newspaper"></i>
                <span>AUTOAJUDA</span>
            </button>

        </section>

        <!-- RODAPÉ -->
        <footer class="footer">

            <h3>Está passando por um momento difícil?</h3>

            <button class="cvv">
                <i class="fa-solid fa-phone"></i>
                LIGAR PARA O CVV - 188
            </button>

        </footer>

    </div>

    <script src="script.js"></script>

</body>
</html>
