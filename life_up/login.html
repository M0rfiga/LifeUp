<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <img src="img/30951bd8-559c-4b6f-8e13-6869eb7b5a7f.jpeg" alt="Logo Life Up" class="logo">
    <title>Life Up</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">

        
        <div class="card cadastro">

            <h1>Cadastro</h1>
             <form>

                <label>Nome completo*</label>
                <input type="text" placeholder="Digite seu nome">

                <label>E-mail*</label>
                <input type="email" placeholder="Digite seu e-mail">

                <label>Número de celular</label>
                <input type="tel" placeholder="(00) 00000-0000">

                <label>Senha*</label>
                <input type="password" placeholder="Digite sua senha">

                <label>Confirmar senha*</label>
                <input type="password" placeholder="Confirme sua senha">
                <p class="obrigatorio">* Preenchimento obrigatório</p>

                <div class="checkbox-group">
                    <input type="checkbox">
                    <span>Conta para atendimentos (verificação necessária)</span>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox">
                    <span>Aceito os termos de uso e condições</span>
                </div>

                <button type="submit">Criar</button>
                 <p class="link">
                    Já tem uma conta?
                    <a href="#">Entrar</a>
                </p>

            </form>

        </div>
 
        <div class="card login">

           

            <h2>Life Up</h2>

            <h1>Login</h1>

            <form>

                <label>E-mail</label>
                <input type="email" placeholder="Digite seu e-mail">

                <label>Senha</label>
                <input type="password" placeholder="Digite sua senha">

                <a href="#" class="senha" onclick="esqueciSenha()">
                    Esqueceu sua senha?
                </a>

                <button type="submit">Entrar</button>

                <p class="link">
                    Não possui uma conta?
                    <a href="#">Crie uma!</a>
                </p>

            </form>

        </div>

    </div>

    <script>
        function esqueciSenha() {

            let email = prompt("Digite seu e-mail para recuperar sua senha:");

            if(email === "") {
                alert("Você precisa digitar um e-mail.");
            }

            else if(email == null) {
                alert("Recuperação cancelada.");
            }

            else {
                alert("Um link de recuperação foi enviado para: " + email);
            }
        }
    </script>


</body>
</html>
